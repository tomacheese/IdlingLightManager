name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dotnet packages
        run: dotnet restore IdlingLightManager.slnx

      - name: Build solution
        run: dotnet build IdlingLightManager.slnx /p:Configuration=Release

      - name: Publish solution
        run: dotnet publish IdlingLightManager.slnx -p:PublishProfile=Publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: IdlingLightManager
          path: |
            **/publish/

      - name: Check code style
        run: dotnet format IdlingLightManager.slnx --verify-no-changes --severity warn
