name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dotnet packages
        run: dotnet restore IdlingLightManager.slnx

      - name: Build solution
        run: dotnet build IdlingLightManager.slnx /p:Configuration=Release

      - name: Publish solution
        run: dotnet publish IdlingLightManager.slnx -p:PublishProfile=Publish

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: IdlingLightManager
          path: |
            **/publish/

      - name: Check code style
        run: dotnet format IdlingLightManager.slnx --verify-no-changes --severity warn
